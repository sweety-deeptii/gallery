<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Gallery</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* Header */
h1 {
    text-align: center;
    font-size: 40px;
    margin: 20px;
    letter-spacing: 3px;
}

/* Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    padding: 10px;
}

/* Images */
.gallery img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    cursor: pointer;
    border-radius: 10px;
}

/* Fullscreen view */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
}

</style>
</head>

<body>

<h1>MY GALLERY</h1>

<div class="gallery">
    <!-- Add your images here -->
    <img src="images/img1.jpg" onclick="openImg(this.src)">
    <img src="images/img2.jpg" onclick="openImg(this.src)">
    <img src="images/img3.jpg" onclick="openImg(this.src)">
</div>

<div class="viewer" id="viewer" onclick="closeImg()">
    <img id="fullImg">
</div>

<script>
function openImg(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("fullImg").src = src;
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
