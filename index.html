<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepti's Secret</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* Header */
.header {
    position: sticky;
    top: 0;
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    z-index: 1000;
}

/* Masonry Grid */
.gallery {
    column-count: 4;
    column-gap: 10px;
    padding: 10px;
}

@media(max-width:1000px){
    .gallery { column-count: 3; }
}
@media(max-width:700px){
    .gallery { column-count: 2; }
}
@media(max-width:500px){
    .gallery { column-count: 1; }
}

.gallery img {
    width: 100%;
    margin-bottom: 10px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

/* Fullscreen Viewer */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.95);
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

.viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="header">Deepti's Secret</div>

<div class="gallery">

    <!-- Your Images -->
    <img src="img1.jpg" onclick="openImg(this.src)">
    <img src="img2.jpg" onclick="openImg(this.src)">
    <img src="img3.jpg" onclick="openImg(this.src)">
    <img src="img4.jpg" onclick="openImg(this.src)">
    <img src="img5.jpg" onclick="openImg(this.src)">
    <img src="img6.jpg" onclick="openImg(this.src)">
    <img src="img7.jpg" onclick="openImg(this.src)">
    <img src="img8.jpg" onclick="openImg(this.src)">
    <img src="img9.jpg" onclick="openImg(this.src)">
    <img src="img10.jpg" onclick="openImg(this.src)">
    <img src="img11.jpg" onclick="openImg(this.src)">
    <img src="img12.jpg" onclick="openImg(this.src)">
    <img src="img13.jpg" onclick="openImg(this.src)">
    <img src="img14.jpg" onclick="openImg(this.src)">
    <img src="img15.jpg" onclick="openImg(this.src)">

</div>

<div class="viewer" id="viewer" onclick="closeImg()">
    <img id="fullImg">
</div>

<script>
function openImg(src){
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("fullImg").src = src;
}

function closeImg(){
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
